<main class="page">
	<section class="section flex items-center justify-center p-4">
		@if (isLoading() !== true && task(); as task) {
			<div class="flex flex-col gap-4 w-full">
				<div class="flex items-center justify-between gap-4">
					<h2 class="text-3xl font-bold">
							{{ task.title }}
					</h2>
					<div class="flex flex-row gap-2">
						<button (click)="toggleEdit()" class="btn-primary rounded-xl p-2 bg-primary text-background">
							{{ isEditing() ? 'View Details' : 'Edit Task' }}
						</button>
						<button (click)="deleteTask(taskId)" class="btn-primary rounded-xl p-2 bg-red-500 text-background">
							Delete
						</button>
					</div>
				</div>
				@if(isEditing()) {
					<form-task
						[id]="taskId"
						[data]="{
							id: task.id,
							title: task.title,
							description: task.description,
							urgencyTier: task.urgencyTier,
							status: task.status,
							noteId: task.noteId
						}"
						text="Edit this task"
						(task)="editNote($event)"
						method="PUT"
					/>
				}
				@else{
					<task-detail
						[task]="task"
					/>
				}
		</div>
		}
	</section>
</main>
